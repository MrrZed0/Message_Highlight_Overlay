<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Twitch TTS Overlay</title>
<style>
  :root{
    --bg:#1c1c21;
    --border:#666;
    --text:#ffffff;
    --name:#8e7cff;
    --shadow:0 2px 10px rgba(0,0,0,.55);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    pointer-events:none;
  }

  #stage{
    position:relative;
    width:100vw;
    height:100vh;
  }

  .card{
    position:absolute;
    left:20px;
    bottom:20px;
    width:min(900px, calc(100vw - 40px));
    min-height:110px;
    display:flex;
    gap:14px;
    align-items:flex-start;
    padding:14px 16px 14px 14px;
    background:rgba(28,28,33,.97);
    border:2px solid rgba(105,105,110,.9);
    box-shadow:var(--shadow);
    opacity:0;
    transform:translateY(14px) scale(.98);
    transition:opacity .25s ease, transform .25s ease;
  }

  .card.show{
    opacity:1;
    transform:translateY(0) scale(1);
  }

  .avatar{
    width:58px;
    height:58px;
    border-radius:50%;
    object-fit:cover;
    flex:0 0 auto;
    display:block;
    background:#333;
    border:2px solid #d8d8d8;
  }

  .content{
    flex:1 1 auto;
    min-width:0;
  }

  .name{
    color:var(--name);
    font-size:25px;
    font-weight:800;
    line-height:1.1;
    margin-bottom:6px;
    text-shadow:0 1px 1px rgba(0,0,0,.6);
  }

  .message{
    color:var(--text);
    font-size:24px;
    line-height:1.3;
    font-weight:600;
    word-break:break-word;
    overflow-wrap:anywhere;
    text-shadow:0 1px 1px rgba(0,0,0,.6);
  }

  .badge{
    display:inline-block;
    width:14px;
    height:14px;
    margin-right:8px;
    border-radius:3px;
    background:#e41d24;
    vertical-align:middle;
  }
</style>
</head>
<body>
  <div id="stage">
    <div id="card" class="card">
      <img id="avatar" class="avatar" src="" alt="avatar" />
      <div class="content">
        <div id="name" class="name"><span class="badge"></span>Username</div>
        <div id="message" class="message">Message</div>
      </div>
    </div>
  </div>

  <audio id="ttsAudio" preload="auto"></audio>

<script>
(() => {
  const WS_URL = 'ws://127.0.0.1:8080/';
  const SHOW_MS = 20000;

  const card = document.getElementById('card');
  const avatar = document.getElementById('avatar');
  const nameEl = document.getElementById('name');
  const messageEl = document.getElementById('message');
  const ttsAudio = document.getElementById('ttsAudio');

  let ws = null;
  let reconnectTimer = null;
  let hideTimer = null;

  function showOverlay(data) {
    const profile = data.showuserprofile || '';
    const user = data.showusername || '';
    const msg = data.showusermessage || '';
    const audioPath = data.ttsFile || 'tts_message.wav';

    avatar.src = profile;
    avatar.onerror = function () {
      this.onerror = null;
      this.src = 'https://static-cdn.jtvnw.net/jtv_user_pictures/xarth/404_user_300x300.png';
    };

    nameEl.innerHTML = '<span class="badge"></span>' + escapeHtml(user);
    messageEl.textContent = msg;

    card.classList.add('show');

    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      card.classList.remove('show');
    }, SHOW_MS);

    playTts(audioPath);
  }

  function playTts(path) {
    try {
      ttsAudio.pause();
      ttsAudio.currentTime = 0;

      const url = path + '?t=' + Date.now();
      ttsAudio.src = url;
      ttsAudio.load();

      const playPromise = ttsAudio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch(err => console.log('Audio play failed:', err));
      }
    } catch (err) {
      console.log('TTS play error:', err);
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  function tryHandleMessage(raw) {
    let msg;
    try {
      msg = JSON.parse(raw);
    } catch {
      return false;
    }

    if (msg && msg.event && msg.data && msg.data.type === 'custom.twitch.tts') {
      showOverlay(msg.data.payload || {});
      return true;
    }

    if (msg && msg.type === 'custom.twitch.tts' && msg.payload) {
      showOverlay(msg.payload);
      return true;
    }

    if (msg && msg.showusername !== undefined && msg.showusermessage !== undefined) {
      showOverlay(msg);
      return true;
    }

    return false;
  }

  function connect() {
    clearTimeout(reconnectTimer);

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      try {
        ws.send(JSON.stringify({
          request: 'Subscribe',
          id: 'sub-twitch-tts-overlay',
          events: {
            General: ['Custom']
          }
        }));
      } catch (e) {}
    };

    ws.onmessage = (event) => {
      tryHandleMessage(event.data);
    };

    ws.onclose = () => {
      reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => {};
  }

  connect();

  window.testTtsOverlay = function () {
    showOverlay({
      showuserprofile: 'https://static-cdn.jtvnw.net/jtv_user_pictures/908be9e8-969f-4ebf-9cc8-a9c7ef9b7b20-profile_image-300x300.png',
      showusername: 'Teklynk',
      showusermessage: 'This is a test message using generated TTS audio.',
      ttsFile: 'tts_message.wav'
    });
  };
})();
</script>
</body>
</html>
